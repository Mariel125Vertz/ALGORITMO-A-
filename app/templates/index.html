<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mariloks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #ffffff;
            padding: 20px;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contenedor {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            padding: 10px;
        }

        h1 {
            text-align: center;
            color: #000000;
            font-size: 22px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
            margin-bottom: 25px;
        }

        th {
            background: #fff0f2;
            color: #000000;
            padding: 6px;
            border: 1px solid #999999;
            font-weight: bold;
            font-size: 14px;
        }

        td {
            padding: 6px;
            border: 1px solid #999999;
            text-align: center;
            background: #ffffff;
            color: #000000;
            font-size: 14px;
        }

        tr:nth-child(even) td {
            background: #ffffff;
        }

        td:first-child {
            background: #fff0f2;
            color: #000000;
            font-weight: bold;
        }

        .acciones {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .btn {
            padding: 5px 10px;
            border: 1px solid #b99099;
            background: #fff0f2;
            color: #000000;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }

        .resultado {
            margin-top: 25px;
            padding-top: 0px;
            display: none;
        }

        .headerResultado {
            margin-bottom: 15px;
        }

        .headerResultado h2 {
            color: #000000;
            font-size: 18px;
            margin-top: 10px;
        }

        .cardResultado {
            background: #ffffff;
            border: 1px solid #999999;
            padding: 10px 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .infoTipo {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tipo {
            color: #000000;
            font-size: 14px;
            font-weight: bold;
            background: #fff0f2;
            padding: 2px 6px;
            border: 1px solid #b99099;
            display: inline-block;
            align-self: flex-start;
        }

        .empresa {
            color: #000000;
            font-size: 13px;
            margin-top: 4px;
        }

        .precio {
            color: #000000;
            font-weight: bold;
            font-size: 14px;
        }

        .footerResultado {
            margin-top: 20px;
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .textoTotal {
            color: #000000;
            font-size: 18px;
            font-weight: bold;
        }

        .precioTotal {
            color: #000000;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="contenedor">

        <h1>Algoritmo A*</h1>

        <table>
            <tr>
                <th>Empresa</th>
                <th>T</th>
                <th>H</th>
                <th>V</th>
                <th>W</th>
            </tr>
            <tr>
                <td>Empresa 1</td>
                <td>20</td>
                <td>30</td>
                <td>20</td>
                <td>40</td>
            </tr>
            <tr>
                <td>Empresa 2</td>
                <td>50</td>
                <td>50</td>
                <td>40</td>
                <td>50</td>
            </tr>
            <tr>
                <td>Empresa 3</td>
                <td>60</td>
                <td>55</td>
                <td>50</td>
                <td>60</td>
            </tr>
            <tr>
                <td>Empresa 4</td>
                <td>100</td>
                <td>80</td>
                <td>60</td>
                <td>70</td>
            </tr>
        </table>

        <div class="acciones">
            <button class="btn" onclick="verResultado()">
                Mostrar mejor combinación
            </button>
        </div>

        <div class="resultado" id="resultado">
            <div class="headerResultado">
                <h2>SOLUCIÓN ÓPTIMA</h2>
            </div>

            <div id="contenidoCards"></div>

            <div class="footerResultado">
                <div class="textoTotal">COSTO TOTAL:</div>
                <div class="precioTotal" id="total"></div>
            </div>
        </div>

    </div>

    <script>
        const costos = {
            Empresa1:{ T:20, H:30, V:20, W:40 },
            Empresa2:{ T:50, H:50, V:40, W:50 },
            Empresa3:{ T:60, H:55, V:50, W:60 },
            Empresa4:{ T:100, H:80, V:60, W:70 }
        }

        const tipos = ['T','H','V','W']
        const empresas = Object.keys(costos)

        function heuristica(asignados, indiceTipo){
            let restantes = tipos.slice(indiceTipo)
            let disponibles = empresas.filter(e => !asignados.includes(e))
            let h = 0

            for(let tipo of restantes){
                let minimo = Math.min(...disponibles.map(e => costos[e][tipo]))
                h += minimo
            }
            return h
        }

        function aEstrella(){
            let frontera = []
            frontera.push({
                asignacion:[],
                g:0,
                f:0
            })

            while(frontera.length > 0){
                frontera.sort((a,b)=>a.f-b.f)
                let actual = frontera.shift()
                let indiceTipo = actual.asignacion.length

                if(indiceTipo === tipos.length){
                    return actual
                }

                let tipoActual = tipos[indiceTipo]

                for(let empresa of empresas){
                    if(!actual.asignacion.includes(empresa)){
                        let nuevaAsignacion = [...actual.asignacion, empresa]
                        let costoActual = costos[empresa][tipoActual]
                        let nuevoG = actual.g + costoActual
                        let nuevoH = heuristica(nuevaAsignacion, indiceTipo + 1)
                        let nuevoF = nuevoG + nuevoH

                        frontera.push({
                            asignacion: nuevaAsignacion,
                            g: nuevoG,
                            f: nuevoF
                        })
                    }
                }
            }
        }

        function verResultado(){
            let solucionGlobal = aEstrella()
            let contenido = document.getElementById('contenidoCards')
            contenido.innerHTML = ''

            for(let i=0; i<tipos.length; i++){
                let empresa = solucionGlobal.asignacion[i]
                let tipo = tipos[i]
                let precio = costos[empresa][tipo]

                contenido.innerHTML += `
                    <div class="cardResultado">
                        <div class="infoTipo">
                            <div class="tipo">Tipo ${tipo}</div>
                            <div class="empresa">Asignado a: ${empresa}</div>
                        </div>
                        <div class="precio">${precio}</div>
                    </div>
                `
            }

            document.getElementById('total').innerHTML = solucionGlobal.g
            document.getElementById('resultado').style.display = 'block'
        }
    </script>

</body>
</html>
